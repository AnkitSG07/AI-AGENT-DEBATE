    *{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink)}body{padding:0;padding-top:env(safe-area-inset-top);padding-bottom:calc(82px + env(safe-area-inset-bottom));overflow-x:hidden}.app{min-height:100vh;width:100%;max-width:560px;margin:0 auto;background:var(--bg)}.screen{display:none}.screen.active{display:block}
    .app-head{display:flex;align-items:center;justify-content:space-between;padding:22px 20px 12px}.app-head h1{font-size:32px;margin:0;letter-spacing:-.055em}.head-actions{display:flex;align-items:center;gap:10px}.head-icon{width:38px;height:38px;border:0;border-radius:14px;background:#fff;box-shadow:var(--shadow);font-size:18px;color:#111}.operator-pill{display:flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 11px;font-size:12px;font-weight:800;color:#666;box-shadow:var(--shadow)}.dot{width:8px;height:8px;border-radius:50%;background:var(--green)}.dot.busy,.dot.dnd,.dot.offline{background:var(--red)}.dot.away{background:#ffb020}
    .tabs{margin:4px 20px 12px;background:#fff;border-radius:18px;padding:6px;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;box-shadow:var(--shadow)}.tab{border:0;background:transparent;border-radius:14px;padding:10px 2px;font-size:13px;font-weight:850;color:#aaa}.tab.active{background:#111;color:#fff}.status-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;padding:0 20px 14px}.status-btn{border:0;border-radius:15px;background:#fff;color:#8d8d8d;padding:10px 3px;font-size:11px;font-weight:850;box-shadow:var(--shadow)}.status-btn.active[data-status="online"]{background:#111;color:#fff}.status-btn.active[data-status="busy"],.status-btn.active[data-status="dnd"]{background:#ffe7e4;color:#d9352a}.status-btn.active[data-status="away"]{background:#fff2d7;color:#9d6400}.status-btn.active[data-status="offline"]{background:#eee;color:#555}.section-label{padding:8px 21px;color:#aaa;font-size:12px;font-weight:850}.call-list{padding:0 16px 96px}.call-row{min-height:66px;background:#fff;border-radius:20px;display:flex;align-items:center;gap:12px;padding:11px 12px;margin-bottom:9px;box-shadow:var(--shadow);border:1px solid var(--line)}.call-row.empty{min-height:96px}.avatar-mini{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;flex:none;background:#ff4b22;color:#fff;font-weight:950;font-size:14px;position:relative;overflow:hidden}.avatar-mini.green{background:#19bd6b}.avatar-mini.blue{background:#2885f6}.avatar-mini.yellow{background:#ffd166;color:#111}.avatar-mini.grey{background:#e7e7e7;color:#777}.avatar-mini:before{content:"";position:absolute;width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.28);top:8px;left:10px}.avatar-mini span{position:relative;z-index:1}.call-text{min-width:0;flex:1}.call-text b{display:block;font-size:14px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.call-text small{display:flex;align-items:center;gap:4px;color:#9b9b9b;font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.arr{font-size:12px;color:var(--green)}.arr.red{color:var(--red)}.call-action{min-width:46px;height:34px;border-radius:999px;display:grid;place-items:center;background:#f5f5f5;color:#111;font-size:12px;font-weight:900;border:0;padding:0 11px}.call-action.open{background:#eaf0ff;color:#3157d7}.call-action:disabled{opacity:.55}.test-alert{position:fixed;right:20px;bottom:94px;border:0;border-radius:18px;background:var(--blue);color:#fff;height:44px;padding:0 16px;font-size:13px;font-weight:850;box-shadow:0 12px 24px rgba(69,109,244,.32);z-index:6}.test-alert:before{content:"🔔";margin-right:7px}.bottom-nav{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(12px + env(safe-area-inset-bottom));width:min(520px,calc(100% - 28px));height:62px;border-radius:24px;background:rgba(255,255,255,.94);display:grid;grid-template-columns:repeat(4,1fr);align-items:center;box-shadow:0 16px 38px rgba(0,0,0,.10);z-index:8}.bottom-nav button{border:0;background:transparent;color:#aaa;font-size:18px;display:grid;place-items:center;gap:2px}.bottom-nav button.active{color:#111}.bottom-nav small{font-size:10px;font-weight:850}.panel{padding:0 18px 96px}.panel-title{display:flex;align-items:center;justify-content:space-between;padding:8px 2px 12px}.panel-title h3{font-size:28px;margin:0;letter-spacing:-.05em}.btn{border:0;border-radius:15px;padding:11px 13px;font-size:12px;font-weight:850}.btn.primary{background:#111;color:#fff}.btn.ghost{background:#fff;color:#111;border:1px solid var(--line)}.btn.red{background:#ffe7e4;color:#d9352a}.row-list{display:flex;flex-direction:column;gap:9px}.rowitem{background:#fff;border-radius:18px;padding:14px;display:flex;justify-content:space-between;gap:12px;align-items:center;border:1px solid var(--line);box-shadow:var(--shadow)}.rowitem b{font-size:14px}.rowitem span{display:block;color:#999;font-size:12px;margin-top:4px}.badge{font-size:11px;border-radius:999px;background:#f3f3f3;padding:7px 9px;color:#777;font-weight:850}.field{width:100%;border:0;background:#fff;border-radius:16px;padding:14px;margin-bottom:9px;font-weight:750;outline:none;box-shadow:var(--shadow)}.toggles{display:grid;grid-template-columns:1fr 1fr;gap:9px}.toggle{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:16px;padding:12px;font-size:13px;font-weight:800;box-shadow:var(--shadow)}.actions{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.status-box{background:#fff;border-radius:16px;padding:12px;color:#777;white-space:pre-wrap;font-size:12px;line-height:1.4;margin-top:9px;box-shadow:var(--shadow)}.ok{color:#19a656;font-weight:900}.bad{color:#d9352a;font-weight:900}.metric{display:none}
    .call-mode{padding:0;background:#f4f5f4}.call-mode .app{display:none}.call-wrap{display:none}.call-mode .call-wrap{display:block;width:100%;max-width:560px;min-height:100vh;margin:0 auto;background:#f7f8f7;position:relative}.phone{min-height:100vh;display:flex;flex-direction:column;padding:env(safe-area-inset-top) 20px calc(28px + env(safe-area-inset-bottom))}.call-title{text-align:center;font-size:17px;font-weight:950;margin:24px 0 26px}.cmid{text-align:center;display:flex;flex-direction:column;align-items:center}.avatar{width:116px;height:116px;border-radius:50%;background:linear-gradient(135deg,#22c55e,#14b8a6);color:#fff;display:grid;place-items:center;font-size:44px;font-weight:950;box-shadow:0 0 0 10px rgba(34,197,94,.08),0 0 0 22px rgba(34,197,94,.04);animation:pulse 1.35s infinite}.cmid h1{margin:22px 0 0;font-size:30px;line-height:1.15}.phone-no{margin-top:10px;color:#888;font-size:15px;font-weight:800}.call-state{margin-top:22px;padding:9px 14px;border-radius:999px;background:#fff;border:1px solid var(--line);font-size:13px;color:#555;box-shadow:var(--shadow)}.timer{margin-top:12px;font-size:18px;font-weight:900;color:#555}.err{display:none;margin:14px 0 0;padding:12px;border-radius:14px;background:#ffe7e4;color:#d9352a;font-size:13px;line-height:1.4}.err.show{display:block}.call-actions{display:flex;justify-content:center;gap:34px;margin:40px 0 18px}.callbtn{width:82px;height:82px;border-radius:50%;border:0;display:grid;place-items:center;color:#fff;font-size:32px;box-shadow:0 14px 40px rgba(0,0,0,.18)}.accept{background:#22c55e}.reject,.end{background:#ef4444}.labelrow{display:flex;justify-content:center;gap:52px;color:#777;font-size:13px}.foot{border-top:1px solid var(--line);padding-top:16px;margin-top:auto;color:#777;font-size:13px;line-height:1.45}.call-brand,.call-pill,.ctop{display:none}.aux-actions{display:none}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.035)}}

<body>
  <div class="app">
    <main class="screen active" data-screen="home">
      <header class="app-head"><h1>Calls</h1><div class="head-actions"><div class="operator-pill"><span class="dot" id="statusDot"></span><span id="topStatus">Online</span></div><button class="head-icon" aria-label="Refresh" id="refreshHomeBtn">⌕</button></div></header>
      <div class="tabs"><button class="tab active">All</button><button class="tab">Incoming</button><button class="tab">Outgoing</button><button class="tab">Missed</button></div>
      <div class="status-strip"><button class="status-btn" data-status="online">Online</button><button class="status-btn" data-status="busy">Busy</button><button class="status-btn" data-status="away">Away</button><button class="status-btn" data-status="dnd">DND</button><button class="status-btn" data-status="offline">Off</button></div>
      <div class="section-label">Recent</div><div class="call-list" id="homeCallList"><div class="call-row empty"><div class="avatar-mini grey"><span>SH</span></div><div class="call-text"><b>No WhatsApp calls yet</b><small>Real customer calls will appear here.</small></div><button class="call-action" disabled>—</button></div></div>
      <button class="test-alert" id="homeTestCallBtn">Test Alert</button>
    </main>
    <main class="screen" data-screen="calls"><section class="panel"><div class="panel-title"><h3>Call History</h3><button class="btn ghost" id="refreshCallsBtn">Refresh</button></div><div class="row-list" id="callList"></div></section></main>
    <main class="screen" data-screen="devices"><section class="panel"><div class="panel-title"><h3>Devices</h3><button class="btn ghost" id="refreshDevicesBtn">Refresh</button></div><div class="row-list" id="deviceList"></div></section></main>
    <main class="screen" data-screen="settings"><section class="panel"><div class="panel-title"><h3>Settings</h3><small>Operator</small></div><input class="field" id="operatorName" placeholder="Operator name"/><input class="field" id="deviceLabel" placeholder="Device name"/><div class="status-strip" style="padding:0"><button class="status-btn" data-status="online">Online</button><button class="status-btn" data-status="busy">Busy</button><button class="status-btn" data-status="away">Away</button><button class="status-btn" data-status="dnd">DND</button><button class="status-btn" data-status="offline">Off</button></div><div class="toggles" style="margin-top:10px"><label class="toggle">Calls <input type="checkbox" id="receiveCalls" checked></label><label class="toggle">Chats <input type="checkbox" id="receiveChats" checked></label></div><div class="actions"><button class="btn primary" id="saveDeviceBtn">Save</button><button class="btn ghost" id="enableBtn">Enable</button><button class="btn ghost" id="homeEnableBtn">Alerts</button><button class="btn ghost" id="testBtn">Test chat</button><button class="btn ghost" id="testCallBtn">Test call alert</button><button class="btn red" id="resetBtn">Reset</button></div><div class="status-box" id="status">Checking notification setup…</div><div class="status-box" id="settingsBox">Device ID: loading…</div><span class="metric"><b id="metricCalls">0</b><b id="metricDevices">1</b><b id="metricMode">ON</b></span></section></main>
    <nav class="bottom-nav"><button class="active" data-tab="home">▣<small>Calls</small></button><button data-tab="calls">⌘<small>List</small></button><button data-tab="devices">◉<small>Devices</small></button><button data-tab="settings">⚙<small>Setup</small></button></nav>
  </div>
  <div class="call-wrap"><main class="phone" role="application" aria-label="WhatsApp call receiver"><div class="call-title">Incoming WhatsApp Call</div><section class="cmid"><div class="avatar pulse" id="avatar">?</div><h1 id="callerName">Incoming call</h1><div class="phone-no" id="callerPhone">Loading call…</div><div class="call-state" id="callState">Preparing receiver…</div><div class="timer" id="timer">00:00</div><div class="err" id="errorBox"></div></section><section><div class="call-actions"><button class="callbtn reject" id="rejectBtn">✕</button><button class="callbtn accept" id="acceptBtn">☎</button><button class="callbtn end" id="endBtn" style="display:none">✕</button></div><div class="labelrow"><span>Decline</span><span id="acceptLabel">Accept</span></div></section><footer class="foot"><div class="actions"><button class="btn ghost" id="backBtn">Back to App</button><button class="btn ghost" id="refreshBtn">Refresh Call</button></div></footer></main></div><audio id="remoteAudio" autoplay playsinline></audio>
<script>
const $=id=>document.getElementById(id);let currentSub=null;let device=loadDevice();let callsCache=[];let devicesCache=[];let callId='',phone='',callerName='',currentCall=null,pc=null,localStream=null,ringTimer=null,audioCtx=null,startedAt=0,callModeActive=false,callPollTimer=null;
function loadDevice(){let d={};try{d=JSON.parse(localStorage.getItem('sh_operator_device')||'{}')}catch{};if(!d.deviceId)d.deviceId='dev_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8);d.operatorName=d.operatorName||'';d.deviceLabel=d.deviceLabel||'';d.status=d.status||'online';d.receiveCalls=d.receiveCalls!==false;d.receiveChats=d.receiveChats!==false;localStorage.setItem('sh_operator_device',JSON.stringify(d));return d}function saveDevice(){localStorage.setItem('sh_operator_device',JSON.stringify(device))}function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}function shortTime(v){if(!v)return'';try{return new Date(v).toLocaleString()}catch{return v}}function logStatus(m,g){$('status').innerHTML=(g===true?'<span class="ok">OK</span> ':g===false?'<span class="bad">Issue</span> ':'')+String(m||'')}function supported(){return 'serviceWorker'in navigator&&'PushManager'in window&&'Notification'in window}function urlBase64ToUint8Array(s){const p='='.repeat((4-s.length%4)%4),b=(s+p).replace(/-/g,'+').replace(/_/g,'/'),r=atob(b),o=new Uint8Array(r.length);for(let i=0;i<r.length;++i)o[i]=r.charCodeAt(i);return o}async function getRegistration(){const r=await navigator.serviceWorker.register('/sh-operator-sw.js',{scope:'/'});await navigator.serviceWorker.ready;return r}function fillDeviceForm(){$('operatorName').value=device.operatorName||'';$('deviceLabel').value=device.deviceLabel||'';$('receiveCalls').checked=device.receiveCalls!==false;$('receiveChats').checked=device.receiveChats!==false;document.querySelectorAll('.status-btn').forEach(b=>b.classList.toggle('active',b.dataset.status===device.status));$('topStatus').textContent=(device.status||'online').toUpperCase();$('statusDot').className='dot '+(device.status||'online');$('metricMode').textContent=device.receiveCalls!==false?'ON':'OFF';$('settingsBox').textContent=`Device ID: ${device.deviceId}\nOperator: ${device.operatorName||'Not set'}\nDevice: ${device.deviceLabel||'Not set'}\nStatus: ${device.status}\nReceive Calls: ${device.receiveCalls!==false}\nReceive Chats: ${device.receiveChats!==false}`}
function currentDevicePayload(){return{deviceId:device.deviceId,operatorName:device.operatorName||'Operator',deviceLabel:device.deviceLabel||'Operator device',status:device.status||'online',receiveCalls:device.receiveCalls!==false,receiveChats:device.receiveChats!==false,userAgent:navigator.userAgent||'',subscription:currentSub}}
async function refresh(){fillDeviceForm();if(!supported()){logStatus('Push is not supported in this browser.',false);return}try{const k=await(await fetch('/api/push/public-key')).json();if(!k.configured){logStatus('Server push is not configured. Check WEB_PUSH keys in Render.',false);return}const r=await getRegistration();currentSub=await r.pushManager.getSubscription();const p=Notification.permission;if(p==='granted'&&currentSub){logStatus('Notifications enabled. Device profile active.',true);await postStatus();}else if(p==='denied'){logStatus('Notifications are blocked. Allow notifications in site settings.',false);}else{logStatus('Notifications are not enabled yet. Tap Enable.',null)}}catch(e){logStatus(e.message||e,false)}}
async function enable(){if(!supported())return refresh();try{logStatus('Requesting permission…');const k=await(await fetch('/api/push/public-key')).json();if(!k.publicKey||!k.configured)throw new Error('Server push key missing.');const r=await getRegistration(),p=await Notification.requestPermission();if(p!=='granted')throw new Error('Notification permission was not allowed.');currentSub=await r.pushManager.getSubscription();if(!currentSub)currentSub=await r.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlBase64ToUint8Array(k.publicKey)});const res=await fetch('/api/push/subscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(currentDevicePayload())});const data=await res.json().catch(()=>({}));if(!res.ok||data.ok===false)throw new Error(data.error||'Could not save subscription.');logStatus('Device registered. Sending a test notification…',true);await fetch('/api/push/test',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:'SH Operator Call is ready.'})});await loadDevices()}catch(e){logStatus(e.message||e,false)}finally{refresh()}}
async function postStatus(){try{if(!currentSub){const r=await getRegistration();currentSub=await r.pushManager.getSubscription()}await fetch('/api/operator-devices/status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(currentDevicePayload())});await loadDevices()}catch(e){}}async function heartbeat(){try{if(!currentSub){const r=await getRegistration();currentSub=await r.pushManager.getSubscription()}await fetch('/api/operator-devices/heartbeat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({deviceId:device.deviceId,subscription:currentSub})})}catch(e){}}async function reset(){try{const r=await getRegistration(),s=await r.pushManager.getSubscription();if(s){await fetch('/api/push/unsubscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({endpoint:s.endpoint})});await s.unsubscribe()}currentSub=null;logStatus('Subscription reset. You can enable again.',true)}catch(e){logStatus(e.message||e,false)}}async function testChat(){await fetch('/api/push/test',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:'Test notification from SH Operator Call.'})});logStatus('Test chat notification sent.',true)}async function testCall(){await fetch('/api/push/test-call',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:'Test WhatsApp Caller',phone:'919999999999'})});logStatus('Test call alert sent.',true)}
async function loadDevices(){try{const j=await(await fetch('/api/operator-devices',{cache:'no-store'})).json();devicesCache=j.devices||[];$('metricDevices').textContent=devicesCache.length||1;const list=$('deviceList');if(!devicesCache.length){list.innerHTML='<div class="rowitem"><div><b>No devices yet</b><span>Enable notifications on each phone.</span></div><span class="badge">Setup</span></div>';return}list.innerHTML=devicesCache.map(d=>`<div class="rowitem"><div><b>${esc(d.operator_name||'Operator')} • ${esc(d.device_label||'Device')}</b><span>Calls: ${d.receive_calls?'Yes':'No'} • Chats: ${d.receive_chats?'Yes':'No'} • ${esc(shortTime(d.last_seen_at))}</span></div><div class="badge">${esc(d.status||'')}</div></div>`).join('')}catch(e){$('deviceList').innerHTML='<div class="rowitem"><div><b>Device API not active yet</b><span>Deploy server route to show operator devices.</span></div><span class="badge">Pending</span></div>'}}
function callName(c){return c.customer_name||c.name||c.from_name||c.wa_name||c.customer_phone||c.from||c.wa_id||'WhatsApp caller'}function callPhone(c){return c.customer_phone||c.phone||c.from||c.wa_id||''}function callIdOf(c){return c.call_id||c.callId||c.id||''}function callInitial(c){const s=String(callName(c)||callPhone(c)||'?').trim();return (s[0]||'?').toUpperCase()}function isMissed(c){return /miss|declin|reject|failed|ended|terminate/i.test(String(c.event||c.status||''))}
async function loadCalls(){try{const j=await(await fetch('/api/whatsapp-calls/recent',{cache:'no-store'})).json();callsCache=j.calls||[];$('metricCalls').textContent=callsCache.length||0;const home=$('homeCallList');if(!callsCache.length){home.innerHTML='<div class="call-row empty"><div class="avatar-mini grey"><span>SH</span></div><div class="call-text"><b>No WhatsApp calls yet</b><small>Real customer calls will appear here.</small></div><button class="call-action" disabled>—</button></div>';$('callList').innerHTML='<div class="rowitem"><div><b>No call history yet</b><span>Incoming WhatsApp calls will appear after webhook receives them.</span></div><span class="badge">Empty</span></div>';return}home.innerHTML=callsCache.slice(0,12).map((c,i)=>{const cid=esc(callIdOf(c));const name=esc(callName(c));const ph=esc(callPhone(c));const cls=['','green','blue','yellow'][i%4];const missed=isMissed(c);const time=esc(shortTime(c.date||c.received_at||c.created_at||c.timestamp||''));const sub=esc((c.event||c.status||'WhatsApp call')+(time?' • '+time:''));const action=cid?`<button class="call-action open" data-call-id="${cid}" data-name="${name}" data-phone="${ph}">Open</button>`:'<button class="call-action" disabled>—</button>';return `<div class="call-row"><div class="avatar-mini ${cls}"><span>${esc(callInitial(c))}</span></div><div class="call-text"><b>${name}</b><small><span class="arr ${missed?'red':''}">${missed?'↙':'↘'}</span>${sub}</small></div>${action}</div>`}).join('');document.querySelectorAll('[data-call-id]').forEach(b=>b.onclick=()=>openExistingCall(b.dataset.callId,b.dataset.name,b.dataset.phone));$('callList').innerHTML=callsCache.slice(0,30).map(c=>`<div class="rowitem"><div><b>${esc(callName(c))}</b><span>${esc(c.event||c.status||'WhatsApp call')} • ${esc(shortTime(c.date||c.received_at||c.created_at||''))}</span></div><div class="badge">${esc(callPhone(c).slice(-10)||'Call')}</div></div>`).join('')}catch(e){$('homeCallList').innerHTML='<div class="call-row empty"><div class="avatar-mini grey"><span>!</span></div><div class="call-text"><b>Could not load calls</b><small>Check /api/whatsapp-calls/recent backend route.</small></div><button class="call-action" disabled>—</button></div>'}}
function setState(t){$('callState').textContent=t}function showErr(t){const e=$('errorBox');e.textContent=t||'';e.classList.toggle('show',!!t)}function fmtPhone(p){return p?'+'+p:'Unknown WhatsApp number'}function initials(n,p){const s=(n||p||'?').trim();return(s[0]||'?').toUpperCase()}function updateHeader(){$('callerName').textContent=callerName||'WhatsApp caller';$('callerPhone').textContent=fmtPhone(phone);$('avatar').textContent=initials(callerName,phone)}function startTimer(){if(startedAt)return;startedAt=Date.now();setInterval(()=>{const s=Math.floor((Date.now()-startedAt)/1000);$('timer').textContent=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')},1000)}function startRingtone(){try{stopRingtone();audioCtx=new(window.AudioContext||window.webkitAudioContext)();ringTimer=setInterval(()=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.frequency.value=880;g.gain.value=.045;o.connect(g).connect(audioCtx.destination);o.start();setTimeout(()=>{try{o.stop()}catch(e){}},260)},850)}catch(e){}}function stopRingtone(){if(ringTimer)clearInterval(ringTimer);ringTimer=null;if(audioCtx){try{audioCtx.close()}catch(e){}audioCtx=null}}function activateCallMode(){if(callModeActive)return;callModeActive=true;document.body.classList.add('call-mode');updateHeader()}
async function fetchCall(){showErr('');let data=null;if(callId){const r=await fetch(`/api/whatsapp-calls/${encodeURIComponent(callId)}`,{cache:'no-store'});if(r.ok)data=await r.json()}if(!data||!data.ok){const r=await fetch('/api/whatsapp-calls/incoming',{cache:'no-store'}),j=await r.json();data={ok:true,call:(j.calls||[])[0]}}currentCall=data.call||null;if(!currentCall){setState('No active incoming call found');showErr('Call not found or already ended.');return}callId=currentCall.call_id||currentCall.id||callId;phone=(currentCall.customer_phone||currentCall.wa_id||currentCall.from||phone||'').replace(/\D/g,'');callerName=currentCall.customer_name||callerName||'';activateCallMode();updateHeader();setState(currentCall.has_sdp?'Incoming call • ready to answer':'Incoming call event received');if(!currentCall.has_sdp)showErr('This call event does not include WebRTC SDP yet. Accept may fail until Meta sends the session offer.');startRingtone()}
async function checkIncomingCallSilently(){try{if(callModeActive||device.receiveCalls===false||['busy','dnd','offline'].includes(device.status))return;const r=await fetch('/api/whatsapp-calls/incoming',{cache:'no-store'}),j=await r.json().catch(()=>({})),c=(j.calls||[])[0];if(!c)return;currentCall=c;callId=c.call_id||c.id||callId;phone=(c.customer_phone||c.wa_id||c.from||phone||'').replace(/\D/g,'');callerName=c.customer_name||callerName||'';await fetchCall()}catch(e){}}
function startIncomingCallWatcher(){checkIncomingCallSilently();if(callPollTimer)clearInterval(callPollTimer);callPollTimer=setInterval(checkIncomingCallSilently,1800)}function openExistingCall(id,name,ph){callId=id||'';callerName=name||'';phone=(ph||'').replace(/\D/g,'');document.body.classList.add('call-mode');callModeActive=true;updateHeader();fetchCall().catch(e=>{setState('Load failed');showErr(e.message||String(e))})}
async function acceptCall(){try{showErr('');setState('Opening microphone…');stopRingtone();if(!currentCall)await fetchCall();const offer=currentCall?.session?.sdp||currentCall?.raw?.call?.session?.sdp||currentCall?.raw?.call?.connect?.session?.sdp||'';if(!offer)throw new Error('No SDP offer found in this call event. Cannot connect audio yet.');localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));pc.ontrack=ev=>{$('remoteAudio').srcObject=ev.streams[0]};await pc.setRemoteDescription({type:'offer',sdp:offer});const ans=await pc.createAnswer();await pc.setLocalDescription(ans);await new Promise(resolve=>{if(pc.iceGatheringState==='complete')return resolve();const to=setTimeout(resolve,2000);pc.onicegatheringstatechange=()=>{if(pc.iceGatheringState==='complete'){clearTimeout(to);resolve()}}});setState('Accepting WhatsApp call…');const r=await fetch('/api/whatsapp-calls/accept',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({call_id:callId,sdp:pc.localDescription.sdp,sdp_type:pc.localDescription.type,phone_number_id:currentCall.phone_number_id})}),j=await r.json();if(!j.ok)throw new Error(j.error||'Accept failed');$('acceptBtn').style.display='none';$('rejectBtn').style.display='none';$('endBtn').style.display='grid';$('acceptLabel').textContent='Connected';setState('Connected');startTimer()}catch(e){setState('Could not answer');showErr(e.message||String(e));startRingtone()}}
async function rejectCall(){stopRingtone();try{if(callId)await fetch('/api/whatsapp-calls/reject',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({call_id:callId,phone_number_id:currentCall?.phone_number_id})})}catch(e){}setState('Call declined')}async function endCall(){stopRingtone();try{if(callId)await fetch('/api/whatsapp-calls/terminate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({call_id:callId,phone_number_id:currentCall?.phone_number_id})})}catch(e){}try{pc&&pc.close()}catch(e){}if(localStream)localStream.getTracks().forEach(t=>t.stop());setState('Call ended')}
function openCallFromUrl(){const qs=new URLSearchParams(location.search);callId=qs.get('callId')||qs.get('call_id')||'';phone=(qs.get('phone')||'').replace(/\D/g,'');callerName=qs.get('name')||'';if(callId||qs.get('mode')==='call'){callModeActive=false;activateCallMode();fetchCall().catch(e=>{setState('Load failed');showErr(e.message||String(e))})}}function showTab(tab){document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active',s.dataset.screen===tab));document.querySelectorAll('.bottom-nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));if(tab==='calls')loadCalls();if(tab==='devices')loadDevices();if(tab==='settings')refresh()}
document.querySelectorAll('.bottom-nav button').forEach(b=>b.onclick=()=>showTab(b.dataset.tab));document.querySelectorAll('.status-btn').forEach(b=>b.onclick=()=>{device.status=b.dataset.status;saveDevice();fillDeviceForm();postStatus();startIncomingCallWatcher()});$('saveDeviceBtn').onclick=()=>{device.operatorName=$('operatorName').value.trim();device.deviceLabel=$('deviceLabel').value.trim();saveDevice();fillDeviceForm();postStatus()};$('receiveCalls').onchange=e=>{device.receiveCalls=e.target.checked;saveDevice();postStatus();fillDeviceForm();startIncomingCallWatcher()};$('receiveChats').onchange=e=>{device.receiveChats=e.target.checked;saveDevice();postStatus();fillDeviceForm()};$('enableBtn').onclick=enable;$('homeEnableBtn').onclick=enable;$('testBtn').onclick=testChat;$('testCallBtn').onclick=testCall;$('homeTestCallBtn').onclick=testCall;$('resetBtn').onclick=reset;$('refreshCallsBtn').onclick=loadCalls;$('refreshHomeBtn').onclick=loadCalls;$('refreshDevicesBtn').onclick=loadDevices;$('acceptBtn').onclick=acceptCall;$('rejectBtn').onclick=rejectCall;$('endBtn').onclick=endCall;$('refreshBtn').onclick=fetchCall;$('backBtn').onclick=()=>{stopRingtone();callModeActive=false;document.body.classList.remove('call-mode');refresh();startIncomingCallWatcher()};fillDeviceForm();refresh();loadDevices();loadCalls();openCallFromUrl();startIncomingCallWatcher();setInterval(heartbeat,30000);setInterval(loadCalls,15000);
