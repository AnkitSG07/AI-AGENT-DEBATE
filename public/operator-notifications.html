<style>
:root{--bg:#f4f5f4;--card:#fff;--ink:#111;--muted:#858b90;--line:#e8e8e8;--green:#25c45b;--red:#ff3b30;--blue:#456df4;--amber:#f5a623;--shadow:0 10px 28px rgba(0,0,0,.065)}*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink)}body{padding:0;padding-top:env(safe-area-inset-top);padding-bottom:calc(88px + env(safe-area-inset-bottom));overflow-x:hidden}.app{width:100%;max-width:620px;min-height:100vh;margin:0 auto;background:var(--bg)}.screen{display:none}.screen.active{display:block}.app-head{display:flex;align-items:center;justify-content:space-between;padding:22px 20px 12px}.app-head h1{font-size:32px;margin:0;letter-spacing:-.055em}.head-actions{display:flex;align-items:center;gap:10px}.head-icon{width:38px;height:38px;border:0;border-radius:14px;background:#fff;box-shadow:var(--shadow);font-size:18px;color:#111}.operator-pill{display:flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 11px;font-size:12px;font-weight:800;color:#666;box-shadow:var(--shadow)}.dot{width:8px;height:8px;border-radius:50%;background:var(--green)}.dot.busy,.dot.dnd,.dot.offline{background:var(--red)}.dot.away{background:var(--amber)}.tabs{margin:4px 20px 12px;background:#fff;border-radius:18px;padding:6px;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;box-shadow:var(--shadow)}.tab{border:0;background:transparent;border-radius:14px;padding:10px 2px;font-size:13px;font-weight:850;color:#aaa}.tab.active{background:#111;color:#fff}.status-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;padding:0 20px 14px}.status-btn{border:0;border-radius:15px;background:#fff;color:#8d8d8d;padding:10px 3px;font-size:11px;font-weight:850;box-shadow:var(--shadow)}.status-btn.active[data-status="online"]{background:#111;color:#fff}.status-btn.active[data-status="busy"],.status-btn.active[data-status="dnd"]{background:#ffe7e4;color:#d9352a}.status-btn.active[data-status="away"]{background:#fff2d7;color:#9d6400}.status-btn.active[data-status="offline"]{background:#eee;color:#555}.section-label{padding:8px 21px;color:#aaa;font-size:12px;font-weight:850}.call-area,.panel{padding:0 16px 100px}.client-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.client-card{position:relative;min-height:166px;background:#fff;border:1px solid var(--line);border-radius:22px;padding:13px 10px 12px;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;text-align:center;overflow:hidden}.client-card:before{content:"";position:absolute;top:-28px;right:-28px;width:74px;height:74px;border-radius:50%;background:rgba(69,109,244,.08)}.client-card.missed:before{background:rgba(255,59,48,.09)}.client-card.incoming:before{background:rgba(37,196,91,.10)}.client-avatar{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;background:#ff4b22;color:#fff;font-size:15px;font-weight:950;box-shadow:0 8px 18px rgba(0,0,0,.10);position:relative;z-index:1}.client-card:nth-child(4n+2) .client-avatar{background:#19bd6b}.client-card:nth-child(4n+3) .client-avatar{background:#2885f6}.client-card:nth-child(4n+4) .client-avatar{background:#ffd166;color:#111}.client-name{width:100%;margin-top:9px;font-size:13px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.client-phone{width:100%;margin-top:3px;font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.client-meta{margin-top:7px;font-size:10px;color:var(--muted);line-height:1.3;min-height:26px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.client-badge{margin-top:auto;border-radius:999px;padding:6px 8px;font-size:10px;font-weight:900;background:#f1f1f1;color:#666}.client-badge.incoming{background:#e8fff0;color:#0a8f41}.client-badge.missed{background:#ffe7e4;color:#cf2d24}.client-badge.outgoing{background:#eaf0ff;color:#3157d7}.card-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;justify-content:center}.client-open,.client-call{border:0;border-radius:999px;font-size:10px;font-weight:900;padding:7px 10px}.client-open{background:#111;color:#fff}.client-call{background:#e8fff0;color:#0a8f41}.client-call:disabled{background:#eee;color:#999}.empty-card{grid-column:1/-1;min-height:130px;background:#fff;border-radius:22px;border:1px solid var(--line);box-shadow:var(--shadow);display:flex;gap:13px;align-items:center;padding:16px;text-align:left}.empty-icon{width:48px;height:48px;border-radius:50%;display:grid;place-items:center;background:#e7e7e7;color:#777;font-weight:950}.empty-card b{display:block;font-size:15px}.empty-card span{display:block;color:var(--muted);font-size:12px;margin-top:4px}.test-alert{position:fixed;right:20px;bottom:94px;border:0;border-radius:18px;background:var(--blue);color:#fff;height:44px;padding:0 16px;font-size:13px;font-weight:850;box-shadow:0 12px 24px rgba(69,109,244,.32);z-index:6}.test-alert:before{content:"🔔";margin-right:7px}.bottom-nav{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(12px + env(safe-area-inset-bottom));width:min(580px,calc(100% - 28px));height:62px;border-radius:24px;background:rgba(255,255,255,.94);display:grid;grid-template-columns:repeat(4,1fr);align-items:center;box-shadow:0 16px 38px rgba(0,0,0,.10);z-index:8}.bottom-nav button{border:0;background:transparent;color:#aaa;font-size:18px;display:grid;place-items:center;gap:2px}.bottom-nav button.active{color:#111}.bottom-nav small{font-size:10px;font-weight:850}.panel-title{display:flex;align-items:center;justify-content:space-between;padding:8px 2px 12px}.panel-title h3{font-size:28px;margin:0;letter-spacing:-.05em}.btn{border:0;border-radius:15px;padding:11px 13px;font-size:12px;font-weight:850}.btn.primary{background:#111;color:#fff}.btn.ghost{background:#fff;color:#111;border:1px solid var(--line)}.btn.red{background:#ffe7e4;color:#d9352a}.field{width:100%;border:0;background:#fff;border-radius:16px;padding:14px;margin-bottom:9px;font-weight:750;outline:none;box-shadow:var(--shadow)}.toggles{display:grid;grid-template-columns:1fr 1fr;gap:9px}.toggle{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:16px;padding:12px;font-size:13px;font-weight:800;box-shadow:var(--shadow)}.actions{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.status-box{background:#fff;border-radius:16px;padding:12px;color:#777;white-space:pre-wrap;font-size:12px;line-height:1.4;margin-top:9px;box-shadow:var(--shadow)}.ok{color:#19a656;font-weight:900}.bad{color:#d9352a;font-weight:900}.metric{display:none}.call-mode{padding:0;background:#f4f5f4}.call-mode .app{display:none}.call-wrap{display:none}.call-mode .call-wrap{display:block;width:100%;max-width:620px;min-height:100vh;margin:0 auto;background:#f7f8f7;position:relative}.phone{min-height:100vh;display:flex;flex-direction:column;padding:env(safe-area-inset-top) 20px calc(28px + env(safe-area-inset-bottom))}.call-title{text-align:center;font-size:17px;font-weight:950;margin:24px 0 26px}.cmid{text-align:center;display:flex;flex-direction:column;align-items:center}.avatar{width:116px;height:116px;border-radius:50%;background:linear-gradient(135deg,#22c55e,#14b8a6);color:#fff;display:grid;place-items:center;font-size:44px;font-weight:950;box-shadow:0 0 0 10px rgba(34,197,94,.08),0 0 0 22px rgba(34,197,94,.04);animation:pulse 1.35s infinite}.cmid h1{margin:22px 0 0;font-size:30px;line-height:1.15}.phone-no{margin-top:10px;color:#888;font-size:15px;font-weight:800}.call-state{margin-top:22px;padding:9px 14px;border-radius:999px;background:#fff;border:1px solid var(--line);font-size:13px;color:#555;box-shadow:var(--shadow)}.timer{margin-top:12px;font-size:18px;font-weight:900;color:#555}.err{display:none;margin:14px 0 0;padding:12px;border-radius:14px;background:#ffe7e4;color:#d9352a;font-size:13px;line-height:1.4}.err.show{display:block}.call-actions{display:flex;justify-content:center;gap:34px;margin:40px 0 18px}.callbtn{width:82px;height:82px;border-radius:50%;border:0;display:grid;place-items:center;color:#fff;font-size:32px;box-shadow:0 14px 40px rgba(0,0,0,.18)}.accept{background:#22c55e}.reject,.end{background:#ef4444}.labelrow{display:flex;justify-content:center;gap:52px;color:#777;font-size:13px}.foot{border-top:1px solid var(--line);padding-top:16px;margin-top:auto;color:#777;font-size:13px;line-height:1.45}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.035)}}@media(max-width:520px){.client-grid{grid-template-columns:repeat(2,1fr)}.client-card{min-height:160px}.app-head h1{font-size:30px}}
</style>

<body>
<div class="app">
<main class="screen active" data-screen="home"><header class="app-head"><h1>Calls</h1><div class="head-actions"><div class="operator-pill"><span class="dot" id="statusDot"></span><span id="topStatus">Online</span></div><button class="head-icon" id="refreshHomeBtn">⌕</button></div></header><div class="tabs"><button class="tab active" data-filter="all">All</button><button class="tab" data-filter="incoming">Incoming</button><button class="tab" data-filter="outgoing">Outgoing</button><button class="tab" data-filter="missed">Missed</button></div><div class="status-strip"><button class="status-btn" data-status="online">Online</button><button class="status-btn" data-status="busy">Busy</button><button class="status-btn" data-status="away">Away</button><button class="status-btn" data-status="dnd">DND</button><button class="status-btn" data-status="offline">Off</button></div><div class="section-label" id="sectionTitle">All calls</div><div class="call-area"><div class="client-grid" id="homeCallList"><div class="empty-card"><div class="empty-icon">SH</div><div><b>No WhatsApp calls yet</b><span>Real customer calls will appear here.</span></div></div></div></div><button class="test-alert" id="homeTestCallBtn">Test Alert</button></main>
<main class="screen" data-screen="calls"><section class="panel"><div class="panel-title"><h3>Call History</h3><button class="btn ghost" id="refreshCallsBtn">Refresh</button></div><div class="client-grid" id="callList"></div></section></main>
<main class="screen" data-screen="devices"><section class="panel"><div class="panel-title"><h3>Devices</h3><button class="btn ghost" id="refreshDevicesBtn">Refresh</button></div><div id="deviceList"></div></section></main>
<main class="screen" data-screen="settings"><section class="panel"><div class="panel-title"><h3>Settings</h3><small>Operator</small></div><input class="field" id="operatorName" placeholder="Operator name"/><input class="field" id="deviceLabel" placeholder="Device name"/><div class="status-strip" style="padding:0"><button class="status-btn" data-status="online">Online</button><button class="status-btn" data-status="busy">Busy</button><button class="status-btn" data-status="away">Away</button><button class="status-btn" data-status="dnd">DND</button><button class="status-btn" data-status="offline">Off</button></div><div class="toggles" style="margin-top:10px"><label class="toggle">Calls <input type="checkbox" id="receiveCalls" checked></label><label class="toggle">Chats <input type="checkbox" id="receiveChats" checked></label></div><div class="actions"><button class="btn primary" id="saveDeviceBtn">Save</button><button class="btn ghost" id="enableBtn">Enable</button><button class="btn ghost" id="homeEnableBtn">Alerts</button><button class="btn ghost" id="testBtn">Test chat</button><button class="btn ghost" id="testCallBtn">Test call alert</button><button class="btn red" id="resetBtn">Reset</button></div><div class="status-box" id="status">Checking notification setup…</div><div class="status-box" id="settingsBox">Device ID: loading…</div><span class="metric"><b id="metricCalls">0</b><b id="metricDevices">1</b><b id="metricMode">ON</b></span></section></main>
<nav class="bottom-nav"><button class="active" data-tab="home">▣<small>Calls</small></button><button data-tab="calls">⌘<small>History</small></button><button data-tab="devices">◉<small>Devices</small></button><button data-tab="settings">⚙<small>Setup</small></button></nav></div>
<div class="call-wrap"><main class="phone"><div class="call-title" id="callTitle">Incoming WhatsApp Call</div><section class="cmid"><div class="avatar" id="avatar">?</div><h1 id="callerName">Incoming call</h1><div class="phone-no" id="callerPhone">Loading call…</div><div class="call-state" id="callState">Preparing receiver…</div><div class="timer" id="timer">00:00</div><div class="err" id="errorBox"></div></section><section><div class="call-actions"><button class="callbtn reject" id="rejectBtn">✕</button><button class="callbtn accept" id="acceptBtn">☎</button><button class="callbtn end" id="endBtn" style="display:none">✕</button></div><div class="labelrow"><span>Decline</span><span id="acceptLabel">Accept</span></div></section><footer class="foot"><div class="actions"><button class="btn ghost" id="backBtn">Back to App</button><button class="btn ghost" id="refreshBtn">Refresh Call</button></div></footer></main></div><audio id="remoteAudio" autoplay playsinline></audio>
<script>

const $ = (id) => document.getElementById(id);
const CALL_UI_VERSION = 'phase3-2-duration-accuracy-2026-05-28-v1';
let currentSub = null;
let device = loadDevice();
let callsCache = [];
let devicesCache = [];
let activeFilter = 'all';
let callId = '';
let phone = '';
let callerName = '';
let currentCall = null;
let pc = null;
let localStream = null;
let ringTimer = null;
let audioCtx = null;
let startedAt = 0;
let timerInterval = null;
let callModeActive = false;
let callPollTimer = null;
let activeCallPollTimer = null;
let outgoingTimeoutTimer = null;
let incomingTimeoutTimer = null;
let outgoingMode = false;
let callSessionToken = 0;
let outgoingRemoteAnswerApplied = false;
let callConfig = { own_numbers_last10: [], outgoing_timeout_ms: 75000 };
const handledCallIds = new Set(JSON.parse(sessionStorage.getItem('sh_operator_handled_call_ids_v1') || '[]'));

function persistHandledCallIds() {
  try { sessionStorage.setItem('sh_operator_handled_call_ids_v1', JSON.stringify([...handledCallIds].slice(-80))); } catch {}
}
function markHandled(id) {
  const safe = String(id || '').trim();
  if (!safe) return;
  handledCallIds.add(safe);
  persistHandledCallIds();
}
function loadDevice(){let d={};try{d=JSON.parse(localStorage.getItem('sh_operator_device')||'{}')}catch{};if(!d.deviceId)d.deviceId='dev_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8);d.operatorName=d.operatorName||'';d.deviceLabel=d.deviceLabel||'';d.status=d.status||'online';d.receiveCalls=d.receiveCalls!==false;d.receiveChats=d.receiveChats!==false;localStorage.setItem('sh_operator_device',JSON.stringify(d));return d}
function saveDevice(){localStorage.setItem('sh_operator_device',JSON.stringify(device))}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function cleanPhone(v){return String(v||'').replace(/\D/g,'')}
function last10(v){const p=cleanPhone(v);return p.length>=10?p.slice(-10):p}
function isOwnNumber(v){const l=last10(v);return !!l && (callConfig.own_numbers_last10||[]).some(x=>last10(x)===l)}
function shortTime(v){if(!v)return'';try{return new Date(v).toLocaleString()}catch{return v}}
function formatDuration(seconds){const n=Math.max(0,Math.floor(Number(seconds||0)));if(!n)return'';const h=Math.floor(n/3600),m=Math.floor((n%3600)/60),s=n%60;return h?`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`:`${m}:${String(s).padStart(2,'0')}`}
function logStatus(m,g){$('status').innerHTML=(g===true?'<span class="ok">OK</span> ':g===false?'<span class="bad">Issue</span> ':'')+String(m||'')}
function supported(){return 'serviceWorker'in navigator&&'PushManager'in window&&'Notification'in window}
function urlBase64ToUint8Array(s){const p='='.repeat((4-s.length%4)%4),b=(s+p).replace(/-/g,'+').replace(/_/g,'/'),r=atob(b),o=new Uint8Array(r.length);for(let i=0;i<r.length;++i)o[i]=r.charCodeAt(i);return o}
async function getRegistration(){const r=await navigator.serviceWorker.register('/sh-operator-sw.js',{scope:'/'});await navigator.serviceWorker.ready;return r}
async function loadCallConfig(){try{const r=await fetch('/api/whatsapp-calls/config',{cache:'no-store'});const j=await r.json().catch(()=>({}));if(j&&j.ok)callConfig={...callConfig,...j};}catch(e){}}
function fillDeviceForm(){$('operatorName').value=device.operatorName||'';$('deviceLabel').value=device.deviceLabel||'';$('receiveCalls').checked=device.receiveCalls!==false;$('receiveChats').checked=device.receiveChats!==false;document.querySelectorAll('.status-btn').forEach(b=>b.classList.toggle('active',b.dataset.status===device.status));$('topStatus').textContent=(device.status||'online').toUpperCase();$('statusDot').className='dot '+(device.status||'online');$('metricMode').textContent=device.receiveCalls!==false?'ON':'OFF';$('settingsBox').textContent=`Device ID: ${device.deviceId}\nOperator: ${device.operatorName||'Not set'}\nDevice: ${device.deviceLabel||'Not set'}\nStatus: ${device.status}\nReceive Calls: ${device.receiveCalls!==false}\nReceive Chats: ${device.receiveChats!==false}\nCall Engine: ${CALL_UI_VERSION}`}
function currentDevicePayload(){return{deviceId:device.deviceId,operatorName:device.operatorName||'Operator',deviceLabel:device.deviceLabel||'Operator device',status:device.status||'online',receiveCalls:device.receiveCalls!==false,receiveChats:device.receiveChats!==false,userAgent:navigator.userAgent||'',subscription:currentSub}}
async function refresh(){fillDeviceForm();if(!supported()){logStatus('Push is not supported in this browser.',false);return}try{const k=await(await fetch('/api/push/public-key')).json();if(!k.configured){logStatus('Server push is not configured.',false);return}const r=await getRegistration();currentSub=await r.pushManager.getSubscription();const p=Notification.permission;if(p==='granted'&&currentSub){logStatus('Notifications enabled. Device profile active.',true);await postStatus()}else if(p==='denied')logStatus('Notifications are blocked.',false);else logStatus('Notifications are not enabled yet. Tap Enable.',null)}catch(e){logStatus(e.message||e,false)}}
async function enable(){if(!supported())return refresh();try{logStatus('Requesting permission…');const k=await(await fetch('/api/push/public-key')).json();if(!k.publicKey||!k.configured)throw new Error('Server push key missing.');const r=await getRegistration(),p=await Notification.requestPermission();if(p!=='granted')throw new Error('Notification permission was not allowed.');currentSub=await r.pushManager.getSubscription();if(!currentSub)currentSub=await r.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlBase64ToUint8Array(k.publicKey)});const res=await fetch('/api/push/subscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(currentDevicePayload())});const data=await res.json().catch(()=>({}));if(!res.ok||data.ok===false)throw new Error(data.error||'Could not save subscription.');logStatus('Device registered.',true);await loadDevices()}catch(e){logStatus(e.message||e,false)}finally{refresh()}}
async function postStatus(){try{if(!currentSub){const r=await getRegistration();currentSub=await r.pushManager.getSubscription()}await fetch('/api/operator-devices/status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(currentDevicePayload())});await loadDevices()}catch(e){}}
async function heartbeat(){try{if(!currentSub){const r=await getRegistration();currentSub=await r.pushManager.getSubscription()}await fetch('/api/operator-devices/heartbeat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({deviceId:device.deviceId,subscription:currentSub})})}catch(e){}}
async function reset(){try{const r=await getRegistration(),s=await r.pushManager.getSubscription();if(s){await fetch('/api/push/unsubscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({endpoint:s.endpoint})});await s.unsubscribe()}currentSub=null;logStatus('Subscription reset.',true)}catch(e){logStatus(e.message||e,false)}}
async function testChat(){await fetch('/api/push/test',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:'Test notification from SH Operator Call.'})});logStatus('Test chat notification sent.',true)}
async function testCall(){await fetch('/api/push/test-call',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:'Test WhatsApp Caller',phone:'919999999999'})});logStatus('Test call alert sent.',true)}
async function loadDevices(){try{const j=await(await fetch('/api/operator-devices',{cache:'no-store'})).json();devicesCache=j.devices||[];$('metricDevices').textContent=devicesCache.length||1;$('deviceList').innerHTML=devicesCache.length?devicesCache.map(d=>`<div class="empty-card"><div class="empty-icon">${esc((d.operator_name||'O')[0])}</div><div><b>${esc(d.operator_name||'Operator')} • ${esc(d.device_label||'Device')}</b><span>${esc(d.status||'')} • Calls: ${d.receive_calls?'Yes':'No'} • Chats: ${d.receive_chats?'Yes':'No'}</span></div></div>`).join(''):'<div class="empty-card"><div class="empty-icon">SH</div><div><b>No devices yet</b><span>Enable notifications on this phone.</span></div></div>'}catch(e){$('deviceList').innerHTML='<div class="empty-card"><div class="empty-icon">!</div><div><b>Device API not active</b><span>Check backend route.</span></div></div>'}}
function extractCalls(j){if(Array.isArray(j))return j;for(const k of ['calls','items','records','data','events','history'])if(Array.isArray(j?.[k]))return j[k];return []}
function callName(c){return c.customer_name||c.name||c.from_name||c.wa_name||c.profile_name||c.customerPhone||c.customer_phone||c.from||c.wa_id||'WhatsApp caller'}
function callPhone(c){return c.customer_phone||c.customerPhone||c.phone||c.from||c.wa_id||c.msisdn||''}
function callIdOf(c){return c.call_id||c.callId||c.id||c.call?.id||''}
function callInitial(c){const s=String(callName(c)||callPhone(c)||'?').trim();return(s[0]||'?').toUpperCase()}
function eventText(c){return String(c.status||c.event||c.type||c.direction||c.action||'WhatsApp call')}
function callKind(c){const direction=String(c.direction||'').toLowerCase();const status=String(c.status||c.display_status||eventText(c)||'').toLowerCase();const historyKind=String(c.history_kind||'').toLowerCase();if(direction==='outgoing'||historyKind==='outgoing')return'outgoing';if(status==='missed'||status==='no_answer'||/timeout|no.answer|no_answer|unanswered/.test(status)||historyKind==='missed')return'missed';return'incoming'}
function statusLabel(c){const raw=String(c.display_status||c.status||eventText(c)||'call').toLowerCase().replace(/_/g,' ');const map={'incoming ringing':'Ringing','outgoing ringing':'Ringing','no answer':'No Answer','no.answer':'No Answer','missed':'Missed','declined':'Declined','rejected':'Rejected','failed':'Failed','busy':'Busy','ended':'Ended','connected':'Connected','outgoing':'Outgoing','connect':'Ringing','terminate':'Ended','reject':'Declined'};return map[raw]||raw.replace(/\w/g,m=>m.toUpperCase())}
function dedupeCalls(rows=[]){const map=new Map();for(const r of rows||[]){const id=callIdOf(r)||`${callPhone(r)}-${r.timestamp||r.date||Math.random()}`;const prev=map.get(id);if(!prev||Number(r.timestamp||0)>=Number(prev.timestamp||0))map.set(id,r)}return[...map.values()].sort((a,b)=>Number(b.timestamp||0)-Number(a.timestamp||0))}
function cardHtml(c){const kind=callKind(c),name=esc(callName(c)),ph=esc(callPhone(c)),digits=cleanPhone(ph),time=esc(shortTime(c.date||c.updated_at||c.received_at||c.created_at||c.timestamp||c.time||''));const duration=esc(formatDuration(c.duration_seconds));const label=kind==='outgoing'?'Call Again':'Call Back';const disabled=!digits||isOwnNumber(digits);const call=disabled?`<button class="client-call" disabled>${isOwnNumber(digits)?'Own No.':'No No.'}</button>`:`<button class="client-call" data-out-phone="${digits}" data-out-name="${name}">${label}</button>`;const badge=esc(statusLabel(c));const meta=[badge,duration?('Talk '+duration):'',time].filter(Boolean).join(' • ');return `<div class="client-card ${kind}"><div class="client-avatar">${esc(callInitial(c))}</div><div class="client-name">${name}</div><div class="client-phone">${digits?('+'+digits):'No number'}</div><div class="client-meta">${meta}</div><div class="client-badge ${kind}">${badge}</div><div class="card-actions">${call}</div></div>`}
function renderCalls(){const list=activeFilter==='all'?callsCache:callsCache.filter(c=>callKind(c)===activeFilter);$('sectionTitle').textContent=activeFilter==='all'?'All calls':activeFilter[0].toUpperCase()+activeFilter.slice(1);const empty=`<div class="empty-card"><div class="empty-icon">SH</div><div><b>No ${activeFilter==='all'?'WhatsApp':activeFilter} calls yet</b><span>Calls will appear after live webhook sync.</span></div></div>`;$('homeCallList').innerHTML=list.length?list.map(cardHtml).join(''):empty;$('callList').innerHTML=callsCache.length?callsCache.map(cardHtml).join(''):empty;document.querySelectorAll('[data-out-phone]').forEach(b=>b.onclick=()=>startOutgoingCall(b.dataset.outPhone,b.dataset.outName))}
async function loadCalls(){try{const j=await(await fetch('/api/whatsapp-calls/recent?limit=120',{cache:'no-store'})).json().catch(()=>({}));callsCache=dedupeCalls(extractCalls(j));$('metricCalls').textContent=callsCache.length||0;renderCalls()}catch(e){$('homeCallList').innerHTML='<div class="empty-card"><div class="empty-icon">!</div><div><b>Could not load calls</b><span>Check recent call endpoint.</span></div></div>'}}
function setState(t){$('callState').textContent=t}
function showErr(t){const e=$('errorBox');e.textContent=t||'';e.classList.toggle('show',!!t)}
function fmtPhone(p){return p?'+'+cleanPhone(p):'Unknown WhatsApp number'}
function initials(n,p){const s=(n||p||'?').trim();return(s[0]||'?').toUpperCase()}
function updateHeader(){$('callerName').textContent=callerName||'WhatsApp caller';$('callerPhone').textContent=fmtPhone(phone);$('avatar').textContent=initials(callerName,phone)}
function startTimer(){if(timerInterval)return;startedAt=Date.now();timerInterval=setInterval(()=>{const s=Math.floor((Date.now()-startedAt)/1000);$('timer').textContent=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')},1000)}
function stopTimer(){if(timerInterval)clearInterval(timerInterval);timerInterval=null;startedAt=0;$('timer').textContent='00:00'}
function startRingtone(){try{stopRingtone();audioCtx=new(window.AudioContext||window.webkitAudioContext)();ringTimer=setInterval(()=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.frequency.value=880;g.gain.value=.045;o.connect(g).connect(audioCtx.destination);o.start();setTimeout(()=>{try{o.stop()}catch(e){}},260)},850)}catch(e){}}
function stopRingtone(){if(ringTimer)clearInterval(ringTimer);ringTimer=null;if(audioCtx){try{audioCtx.close()}catch(e){}audioCtx=null}}
function stopActiveCallPolling(){if(activeCallPollTimer)clearInterval(activeCallPollTimer);activeCallPollTimer=null;if(outgoingTimeoutTimer)clearTimeout(outgoingTimeoutTimer);outgoingTimeoutTimer=null;if(incomingTimeoutTimer)clearTimeout(incomingTimeoutTimer);incomingTimeoutTimer=null}
function closeMedia(){try{pc&&pc.close()}catch(e){}pc=null;if(localStream)localStream.getTracks().forEach(t=>{try{t.stop()}catch(e){}});localStream=null;if($('remoteAudio'))$('remoteAudio').srcObject=null}
function cleanupCallUi({keepHandled=true}={}){if(keepHandled)markHandled(callId);stopActiveCallPolling();stopTimer();stopRingtone();closeMedia();callModeActive=false;outgoingMode=false;outgoingRemoteAnswerApplied=false;currentCall=null;callId='';phone='';callerName='';document.body.classList.remove('call-mode');$('acceptBtn').style.display='grid';$('rejectBtn').style.display='grid';$('endBtn').style.display='none';$('acceptLabel').textContent='Accept';showErr('')}
function setCallButtons(mode){const accept=$('acceptBtn'),reject=$('rejectBtn'),end=$('endBtn'),label=$('acceptLabel');accept.style.display='none';reject.style.display='none';end.style.display='none';if(mode==='incoming_ringing'){accept.style.display='grid';reject.style.display='grid';label.textContent='Accept'}else if(mode==='outgoing_dialing'||mode==='outgoing_ringing'||mode==='connected'){end.style.display='grid';label.textContent=mode==='connected'?'Connected':'Calling'}else{label.textContent='Ended'}}
function activateCallMode(title='Incoming WhatsApp Call'){callModeActive=true;document.body.classList.add('call-mode');document.querySelector('.foot')?.style.setProperty('display','none','important');$('callTitle').textContent=title;updateHeader()}
function autoCloseEnded(message='Call ended'){setState(message);setCallButtons('ended');setTimeout(()=>{cleanupCallUi();loadCalls();startIncomingCallWatcher()},850)}
function startIncomingRingingGuards(token){startActiveCallPolling(token);if(incomingTimeoutTimer)clearTimeout(incomingTimeoutTimer);const ms=Math.max(45000,Math.min(Number(callConfig.active_window_ms||90000),120000));incomingTimeoutTimer=setTimeout(()=>{if(token!==callSessionToken||!callModeActive||outgoingMode)return;markHandled(callId);autoCloseEnded('Missed call')},ms)}
async function waitIce(pcObj){if(!pcObj||pcObj.iceGatheringState==='complete')return;await new Promise(resolve=>{const to=setTimeout(resolve,2500);pcObj.onicegatheringstatechange=()=>{if(pcObj.iceGatheringState==='complete'){clearTimeout(to);resolve()}}})}
function attachPeerConnectionHandlers(token){if(!pc)return;pc.ontrack=e=>{$('remoteAudio').srcObject=e.streams[0]};pc.onconnectionstatechange=()=>{if(token!==callSessionToken)return;const st=pc.connectionState;if(st==='connected'){setState('Connected');setCallButtons('connected');startTimer()}if(st==='failed'||st==='disconnected'||st==='closed'){if(callModeActive)autoCloseEnded('Call disconnected')}};pc.oniceconnectionstatechange=()=>{if(token!==callSessionToken)return;const st=pc.iceConnectionState;if(st==='failed'||st==='disconnected'||st==='closed'){if(callModeActive)autoCloseEnded('Call disconnected')}}}
async function startOutgoingCall(to,name){await loadCallConfig();const dial=cleanPhone(to);if(!dial){alert('No phone number found.');return}if(isOwnNumber(dial)){alert('Blocked: this is your own WhatsApp/business number.');return}if(callModeActive)return;const token=++callSessionToken;outgoingRemoteAnswerApplied=false;try{outgoingMode=true;phone=dial;callerName=name||phone;callId='';currentCall=null;activateCallMode('Outgoing WhatsApp Call');setCallButtons('outgoing_dialing');setState('Dialing…');showErr('');localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));attachPeerConnectionHandlers(token);const offer=await pc.createOffer({offerToReceiveAudio:true,offerToReceiveVideo:false});await pc.setLocalDescription(offer);await waitIce(pc);if(token!==callSessionToken)return;setState('Ringing…');setCallButtons('outgoing_ringing');const r=await fetch('/api/whatsapp-calls/outgoing',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({to:phone,customer_name:callerName,sdp:pc.localDescription.sdp,sdp_type:pc.localDescription.type,operator_device_id:device.deviceId})});const j=await r.json().catch(()=>({}));if(!r.ok||j.ok===false)throw new Error(j.error||'Outgoing call failed');callId=j.call_id||j.id||callId;setState('Ringing… waiting for customer');stopTimer();startActiveCallPolling(token);outgoingTimeoutTimer=setTimeout(()=>{if(token===callSessionToken&&callModeActive&&outgoingMode)endCall('No answer').catch(()=>autoCloseEnded('No answer'))},Number(callConfig.outgoing_timeout_ms||75000));setTimeout(loadCalls,1000)}catch(e){if(token!==callSessionToken)return;setState('Outgoing call failed');showErr(e.message||String(e));setTimeout(()=>cleanupCallUi({keepHandled:false}),1400)}}
function callHasSdp(c){return !!(c?.sdp||c?.session?.sdp||c?.raw?.call?.session?.sdp||c?.raw?.call?.connect?.session?.sdp)}
function callSdp(c){return c?.sdp||c?.session?.sdp||c?.raw?.call?.session?.sdp||c?.raw?.call?.connect?.session?.sdp||''}
function callSdpType(c){return String(c?.sdp_type||c?.session?.sdp_type||c?.session?.type||c?.raw?.call?.session?.sdp_type||c?.raw?.call?.connect?.session?.sdp_type||'').toLowerCase()}
async function applyOutgoingRemoteAnswer(c,token){if(token!==callSessionToken||!outgoingMode||!pc||outgoingRemoteAnswerApplied||!c||c.direction!=='outgoing'||!callHasSdp(c))return false;const sdp=callSdp(c);if(!sdp)return false;let type=callSdpType(c)||'answer';if(type.includes('pranswer'))type='pranswer';else if(type.includes('answer'))type='answer';else if(type.includes('offer')){setState('Customer answered • waiting for compatible audio answer');return false}else type='answer';if(pc.signalingState==='closed')return false;if(pc.signalingState==='stable'){if(pc.connectionState==='connected'||pc.iceConnectionState==='connected'||pc.iceConnectionState==='completed'){outgoingRemoteAnswerApplied=true;setCallButtons('connected');setState('Connected');startTimer();return true}return false}if(pc.signalingState!=='have-local-offer')return false;try{await pc.setRemoteDescription({type,sdp});outgoingRemoteAnswerApplied=true;setCallButtons('connected');setState('Connected');showErr('');startTimer();return true}catch(e){showErr('Customer answered, but audio handshake failed: '+(e.message||String(e)));return false}}
async function fetchCall(){showErr('');let data=null;if(callId){const r=await fetch(`/api/whatsapp-calls/${encodeURIComponent(callId)}`,{cache:'no-store'});if(r.ok)data=await r.json()}if(!data||!data.ok){const r=await fetch('/api/whatsapp-calls/incoming',{cache:'no-store'}),j=await r.json().catch(()=>({}));data={ok:true,call:extractCalls(j)[0]}}currentCall=data.call||null;if(!currentCall){setState('No active incoming call found');showErr('Call not found or already ended.');return null}if(currentCall.direction==='outgoing'||isOwnNumber(currentCall.customer_phone||currentCall.phone)){return null}callId=callIdOf(currentCall)||callId;phone=(callPhone(currentCall)||phone||'').replace(/\D/g,'');callerName=callName(currentCall)||callerName||'';const token=++callSessionToken;activateCallMode('Incoming WhatsApp Call');updateHeader();setCallButtons('incoming_ringing');setState(callHasSdp(currentCall)?'Incoming call':'Incoming call • waiting for session');if(!callHasSdp(currentCall))showErr('Incoming call received but WebRTC session is not ready yet. Try Refresh Call.');startRingtone();startIncomingRingingGuards(token);return currentCall}
async function checkIncomingCallSilently(){try{if(callModeActive||device.receiveCalls===false||['busy','dnd','offline'].includes(device.status))return;const r=await fetch('/api/whatsapp-calls/incoming',{cache:'no-store'}),j=await r.json().catch(()=>({})),c=extractCalls(j)[0];if(!c)return;if(c.direction==='outgoing'||handledCallIds.has(callIdOf(c))||isOwnNumber(callPhone(c)))return;currentCall=c;callId=callIdOf(c)||callId;phone=(callPhone(c)||phone||'').replace(/\D/g,'');callerName=callName(c)||callerName||'';await fetchCall()}catch(e){}}
function startIncomingCallWatcher(){if(callPollTimer)clearInterval(callPollTimer);checkIncomingCallSilently();callPollTimer=setInterval(checkIncomingCallSilently,1800)}
async function acceptCall(){const token=++callSessionToken;try{showErr('');setState('Opening microphone…');stopRingtone();if(!currentCall)await fetchCall();if(!currentCall||currentCall.direction==='outgoing')throw new Error('No active incoming call to accept.');const offer=callSdp(currentCall);if(!offer)throw new Error('No SDP offer found yet. Tap Refresh Call in a few seconds or wait for the next incoming event.');localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));attachPeerConnectionHandlers(token);await pc.setRemoteDescription({type:'offer',sdp:offer});const ans=await pc.createAnswer();await pc.setLocalDescription(ans);await waitIce(pc);if(token!==callSessionToken)return;setState('Accepting WhatsApp call…');const r=await fetch('/api/whatsapp-calls/accept',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({call_id:callId,sdp:pc.localDescription.sdp,sdp_type:pc.localDescription.type,phone_number_id:currentCall.phone_number_id})}),j=await r.json().catch(()=>({}));if(!r.ok||!j.ok)throw new Error(j.error||'Accept failed');setCallButtons('connected');setState('Connected');startTimer();startActiveCallPolling(token)}catch(e){setState('Could not answer');showErr(e.message||String(e));setCallButtons('incoming_ringing');startRingtone()}}
async function rejectCall(){const id=callId,pid=currentCall?.phone_number_id;markHandled(id);stopRingtone();stopTimer();try{if(id)await fetch('/api/whatsapp-calls/reject',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({call_id:id,phone_number_id:pid})})}catch(e){}autoCloseEnded('Call declined')}
async function endCall(reason='Call ended'){const id=callId,pid=currentCall?.phone_number_id;markHandled(id);stopRingtone();stopTimer();try{if(id)await fetch('/api/whatsapp-calls/terminate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({call_id:id,phone_number_id:pid,direction:outgoingMode?'outgoing':'incoming',customer_phone:phone})})}catch(e){}autoCloseEnded(reason)}
function startActiveCallPolling(token){stopActiveCallPolling();if(!callId)return;activeCallPollTimer=setInterval(async()=>{try{if(token!==callSessionToken||!callModeActive||!callId)return;const r=await fetch(`/api/whatsapp-calls/${encodeURIComponent(callId)}`,{cache:'no-store'});const j=await r.json().catch(()=>({}));const c=j.call;if(!c)return;currentCall=c;const st=String(c.status||'').toLowerCase();if(['ended','missed','declined','rejected','failed','busy','no_answer'].includes(st)){autoCloseEnded(statusLabel(c));return}if(outgoingMode&&c.direction==='outgoing'){const applied=await applyOutgoingRemoteAnswer(c,token);if(applied)return;if(st==='connected'||st==='accepted'){if(pc&&(pc.connectionState==='connected'||pc.iceConnectionState==='connected'||pc.iceConnectionState==='completed')){setCallButtons('connected');setState('Connected');startTimer();return}setCallButtons('outgoing_ringing');setState(c.has_sdp?'Customer answered • connecting audio…':'Ringing… waiting for customer');return}if(st==='outgoing_ringing'){setState('Ringing… waiting for customer');return}}if(st==='connected'||st==='accepted'){if(outgoingMode){return}setCallButtons('connected');setState('Connected');startTimer()}}catch(e){}},1500)}
function openCallFromUrl(){const qs=new URLSearchParams(location.search);callId=qs.get('callId')||qs.get('call_id')||'';phone=(qs.get('phone')||'').replace(/\D/g,'');callerName=qs.get('name')||'';if(callId||qs.get('mode')==='call'){fetchCall().catch(e=>{setState('Load failed');showErr(e.message||String(e))})}}
function showTab(tab){document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active',s.dataset.screen===tab));document.querySelectorAll('.bottom-nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));if(tab==='calls')loadCalls();if(tab==='devices')loadDevices();if(tab==='settings')refresh()}
window.startOutgoingCall=startOutgoingCall;
document.querySelectorAll('.bottom-nav button').forEach(b=>b.onclick=()=>showTab(b.dataset.tab));document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');activeFilter=b.dataset.filter||'all';renderCalls()});document.querySelectorAll('.status-btn').forEach(b=>b.onclick=()=>{device.status=b.dataset.status;saveDevice();fillDeviceForm();postStatus();startIncomingCallWatcher()});$('saveDeviceBtn').onclick=()=>{device.operatorName=$('operatorName').value.trim();device.deviceLabel=$('deviceLabel').value.trim();saveDevice();fillDeviceForm();postStatus()};$('receiveCalls').onchange=e=>{device.receiveCalls=e.target.checked;saveDevice();postStatus();fillDeviceForm();startIncomingCallWatcher()};$('receiveChats').onchange=e=>{device.receiveChats=e.target.checked;saveDevice();postStatus();fillDeviceForm()};$('enableBtn').onclick=enable;$('homeEnableBtn').onclick=enable;$('testBtn').onclick=testChat;$('testCallBtn').onclick=testCall;$('homeTestCallBtn').onclick=testCall;$('resetBtn').onclick=reset;$('refreshCallsBtn').onclick=loadCalls;$('refreshHomeBtn').onclick=loadCalls;$('refreshDevicesBtn').onclick=loadDevices;$('acceptBtn').onclick=acceptCall;$('rejectBtn').onclick=rejectCall;$('endBtn').onclick=()=>endCall();$('refreshBtn').onclick=fetchCall;$('backBtn').onclick=()=>{cleanupCallUi();refresh();loadCalls();startIncomingCallWatcher()};
(async()=>{document.querySelector('.foot')?.style.setProperty('display','none','important');await loadCallConfig();fillDeviceForm();refresh();loadDevices();loadCalls();openCallFromUrl();startIncomingCallWatcher();setInterval(heartbeat,30000);setInterval(()=>{if(!callModeActive)loadCalls()},10000)})();
