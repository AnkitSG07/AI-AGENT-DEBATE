function callName(c){return c.customer_name||c.name||c.from_name||c.wa_name||c.profile_name||c.customerName||c.customerPhone||c.customer_phone||c.from||c.wa_id||'WhatsApp caller'}function callPhone(c){return c.customer_phone||c.customerPhone||c.phone||c.from||c.wa_id||c.msisdn||''}function callIdOf(c){return c.call_id||c.callId||c.id||c.call?.id||''}function callInitial(c){const s=String(callName(c)||callPhone(c)||'?').trim();return(s[0]||'?').toUpperCase()}function eventText(c){return String(c.event||c.status||c.type||c.direction||c.action||'WhatsApp call')}function callKind(c){const t=eventText(c).toLowerCase(),d=String(c.direction||'').toLowerCase(),s=String(c.status||'').toLowerCase();if(/miss|declin|reject|failed|ended|terminate|timeout|no.answer|no_answer|unanswered/.test(t)||['missed','declined','failed'].includes(s))return'missed';if(d==='outgoing'||c.is_business_outgoing===true||/out|connect_requested|dialing/.test(t))return'outgoing';return'incoming'}function isLiveIncomingCall(c){const e=eventText(c).toLowerCase(),d=String(c.direction||'').toLowerCase();if(d==='outgoing'||c.is_business_outgoing===true)return false;if(/accept|accepted|reject|rejected|terminate|terminated|end|ended|miss|timeout|failed|declin|busy/.test(e))return false;return /connect|ringing|incoming|pre_accept/.test(e)}function dedupeCalls(rows=[]){const seen=new Set(),out=[];for(const r of rows.sort((a,b)=>Number(b.timestamp||0)-Number(a.timestamp||0))){const key=`${callIdOf(r)}|${eventText(r)}|${r.timestamp||r.date||r.received_at||''}`;if(!key.trim()||seen.has(key))continue;seen.add(key);out.push(r)}return out.slice(0,200)}function cardHtml(c){const kind=callKind(c),name=esc(callName(c)),ph=esc(callPhone(c)),digits=cleanPhone(ph),time=esc(shortTime(c.date||c.received_at||c.created_at||c.timestamp||c.time||''));const callText=kind==='outgoing'?'Call Again':'Call Back';const call=digits?`<button class="client-call" data-out-phone="${digits}" data-out-name="${name}">${callText}</button>`:'< async function loadCalls(){try{clearOldCallCaches();let rows=[],reached=false;try{const o=await(await fetch('/api/odoo/call-log/recent?limit=120',{cache:'no-store'})).json().catch(()=>({}));if(o.ok&&Array.isArray(o.calls)){rows=o.calls;reached=true}}catch{}if(!reached){try{const j=await(await fetch('/api/whatsapp-calls/recent?limit=120',{cache:'no-store'})).json().catch(()=>({}));rows=extractCalls(j)}catch{}}if(!rows.length&&!reached){try{const dbg=await(await fetch('/api/debug/webhooks/recent?kind=calls&limit=100',{cache:'no-store'})).json().catch(()=>({}));rows=extractDebugCalls(dbg)}catch{}}if(reached){callsCache=dedupeCalls(rows);if(rows.length)writeCallCache(callsCache);else{try{localStorage.removeItem(CALL_CACHE_KEY)}catch{}}}else{callsCache=dedupeCalls(rows.length?rows:readCallCache());if(rows.length)writeCallCache(callsCache)}$('metricCalls').textContent=callsCache.length||0;renderCalls()}catch(e){callsCache=dedupeCalls(readCallCache());renderCalls();if(!callsCache.length)$('homeCallList').innerHTML='<div class="empty-card"><div class="empty-icon">!</div><div><b>Could not load calls</b><span>Check recent/debug webhook endpoints.</span></div></div>'}}
function setState(t){$('callState').textContent=t}function showErr(t){const e=$('errorBox');e.textContent=t||'';e.classList.toggle('show',!!t)}function fmtPhone(p){return p?'+'+cleanPhone(p):'Unknown WhatsApp number'}function initials(n,p){const s=(n||p||'?').trim();return(s[0]||'?').toUpperCase()}function updateHeader(){$('callerName').textContent=callerName||'WhatsApp caller';$('callerPhone').textContent=fmtPhone(phone);$('avatar').textContent=initials(callerName,phone)}function startTimer(){if(timerInterval)return;startedAt=Date.now();timerInterval=setInterval(()=>{const s=Math.floor((Date.now()-startedAt)/1000);$('timer').textContent=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')},1000)}function stopTimer(){if(timerInterval)clearInterval(timerInterval);timerInterval=null;startedAt=0;$('timer').textContent='00:00'}function startRingtone(){try{stopRingtone();audioCtx=new(window.AudioContext||window.webkitAudioContext)();ringTimer=setInterval(()=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.frequency.value=880;g.gain.value=.045;o.connect(g).connect(audioCtx.destination);o.start();setTimeout(()=>{try{o.stop()}catch(e){}},260)},850)}catch(e){}}function stopRingtone(){if(ringTimer)clearInterval(ringTimer);ringTimer=null;if(audioCtx){try{audioCtx.close()}catch(e){}audioCtx=null}}function cleanupCallUi(){stopTimer();stopRingtone();try{pc&&pc.close()}catch(e){}pc=null;if(localStream)localStream.getTracks().forEach(t=>t.stop());localStream=null;if($('remoteAudio'))$('remoteAudio').srcObject=null;callModeActive=false;outgoingMode=false;document.body.classList.remove('call-mode');$('acceptBtn').style.display='grid';$('rejectBtn').style.display='grid';$('endBtn').style.display='none';$('acceptLabel').textContent='Accept';showErr('');currentCall=null;callId='';phone='';callerName=''}function activateCallMode(title='Incoming WhatsApp Call'){if(callModeActive)return;callModeActive=true;document.body.classList.add('call-mode');$('call function hideFooterControls(){const back=$('backBtn'),refreshBtn=$('refreshBtn'),foot=document.querySelector('.foot');if(back)back.style.display='none';if(refreshBtn)refreshBtn.style.display='none';if(foot)foot.style.display='none'}function hideAcceptWhenNotAnswerable(){const err=$('errorBox'),state=$('callState'),accept=$('acceptBtn'),label=$('acceptLabel');const text=((err?.textContent||'')+' '+(state?.textContent||'')).toLowerCase();if(accept&&(text.includes('does not include webrtc sdp')||text.includes('call declined')||text.includes('already ended')||text.includes('call not found')||text.includes('call ended'))){accept.style.display='none';if(label)label.textContent=(text.includes('declined')||text.includes('ended')||text.includes('not found'))?'Ended':'Waiting'}}function visualCloseIfEnded(){const state=String($('callState')?.textContent||'').toLowerCase();if(!document.body.classList.contains('call-mode'))return;if(!(state.includes('declined')||state.includes('ended')||state.includes('failed')||state.includes('already ended')||state.includes('not found')))return;setTimeout(()=>{if(!document.body.classList.contains('call-mode'))return;cleanupCallUi();loadCalls();startIncomingCallWatcher()},700)}

async function startOutgoingCall(to,name){try{outgoingMode=true;phone=cleanPhone(to);callerName=name||phone;activateCallMode('Outgoing WhatsApp Call');setState('Preparing outgoing call…');showErr('');$('acceptBtn').style.display='none';$('rejectBtn').style.display='none';$('endBtn').style.display='grid';$('acceptLabel').textContent='Calling';updateHeader();localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));pc.ontrack=e=>{$('remoteAudio').srcObject=e.streams[0]};const offer=await pc.createOffer({offerToReceiveAudio:true,offerToReceiveVideo:false});await pc.setLocalDescription(offer);await waitIce(pc);setState('Calling customer…');const r=await fetch('/api/whatsapp-calls/outgoing',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({to:phone,customer_name:callerName,sdp:pc.localDescription.sdp,sdp_type:pc.localDescription.type})});const j=await r.json().catch(()=>({}));if(!r.ok||j.ok===false)throw new Error(j.error||'Outgoing call failed');callId=j.call_id||j.id||callId;setState('Outgoing call requested. Waiting for customer…');startTimer();setTimeout(loadCalls,1000)}catch(e){setState('Outgoing call failed');showErr(e.message||String(e));stopTimer();try{pc&&pc.close()}catch{};pc=null;if(localStream)localStream.getTracks().forEach(t=>t.stop());localStream=null;setTimeout(()=>{cleanupCallUi();loadCalls();startIncomingCallWatcher()},1600)}}

async function acceptCall(){try{showErr('');setState('Opening microphone…');stopRingtone();if(!currentCall)await fetchCall();const offer=currentCall?.session?.sdp||currentCall?.raw?.call?.session?.sdp||currentCall?.raw?.call?.connect?.session?.sdp||'';if(!offer)throw new Error('No SDP offer found in this call event. Cannot connect audio yet.');localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));pc.ontrack=ev=>{$('remoteAudio').srcObject=ev.streams[0]};await pc.setRemoteDescription({type:'offer',sdp:offer});const ans=await pc.createAnswer();await pc.setLocalDescription(ans);await waitIce(pc);setState('Accepting WhatsApp call…');const r=await fetch('/api/whatsapp-calls/accept',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({call_id:callId,sdp:pc.localDescription.sdp,sdp_type:pc.localDescription.type,phone_number_id:currentCall.phone_number_id})}),j=await r.json();if(!j.ok)throw new Error(j.error||'Accept failed');$('acceptBtn').style.display='none';$('rejectBtn').style.display='none';$('endBtn').style.display='grid';$('acceptLabel').textContent='Connected';setState('Connected');startTimer()}catch(e){setState('Could not answer');showErr(e.message||String(e));startRingtone()}}
async function rejectCall(){const id=callId,pid=currentCall?.phone_number_id;stopRingtone();stopTimer();try{if(id)await fetch('/api/whatsapp-calls/reject',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({call_id:id,phone_number_id:pid})})}catch(e){}setState('Call declined');setTimeout(()=>{cleanupCallUi();loadCalls();startIncomingCallWatcher()},700)}async function endCall(){const id=callId,pid=currentCall?.phone_number_id;stopRingtone();stopTimer();try{if(id)await fetch('/api/whatsapp-calls/terminate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({call_id:id,phone_number_id:pid})})}catch(e){}setState('Call ended');setTimeout(()=>{cleanupCallUi();loadCalls();startIncomingCallWatcher()},700)}function openCallFromUrl(){const qs=new URLSearchParams(location.search);callId=qs.get('callId')||qs.get('call_id')||'';phone=(qs.get('phone')||'').replace(/\D/g,'');callerName=qs.get('name')||'';if(callId||qs.get('mode')==='call'){callModeActive=false;activateCallMode('Incoming WhatsApp Call');fetchCall().catch(e=>{setState('Load failed');showErr(e.message||String(e))})}}function showTab(tab){document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active',s.dataset.screen===tab));document.querySelectorAll('.bottom-nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));if(tab==='calls')loadCalls();if(tab==='devices')loadDevices();if(tab==='settings')refresh()}
