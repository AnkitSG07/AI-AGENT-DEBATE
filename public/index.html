<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Agent Debate</title>
  <style>
    body { font-family: system-ui, Arial; max-width: 1000px; margin: 24px auto; padding: 0 12px; }
    textarea { width: 100%; min-height: 120px; padding: 12px; font-size: 14px; border-radius: 10px; border: 1px solid #ddd; }
    button { padding: 10px 14px; font-size: 14px; cursor: pointer; border-radius: 10px; border: 1px solid #ccc; background: #fff; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .row { display: flex; gap: 12px; align-items: center; margin: 12px 0; flex-wrap: wrap; }
    .muted { color: #666; font-size: 13px; }
    .box { border: 1px solid #e3e3e3; border-radius: 12px; padding: 12px; margin-top: 12px; background: #fafafa; }
    .turn { background:#fff; border:1px solid #eee; border-radius: 12px; padding: 10px; margin: 10px 0; white-space: pre-wrap; }
    .head { display:flex; justify-content:space-between; gap:12px; margin-bottom: 6px; }
    .agent { font-weight: 700; }
    .time { font-size: 12px; color: #777; }
    #finalText { white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>AI Agent Debate</h2>
  <div class="muted">One prompt → 3 AIs debate live → final unified answer.</div>

  <textarea id="prompt" placeholder="Type your prompt..."></textarea>

  <div class="row">
    <label>Rounds:
      <input id="rounds" type="number" value="1" min="1" max="5" />
    </label>
    <label>
      <input id="showDebate" type="checkbox" checked />
      Show live debate
    </label>
    <button id="runBtn">Run Debate</button>
    <button id="clearBtn" type="button">Clear</button>
  </div>

  <div id="status" class="muted"></div>

  <div class="box" id="debateBox" style="display:none;">
    <div><b>Live Debate</b></div>
    <div id="debateStream"></div>
  </div>

  <div class="box" id="finalBox" style="display:none;">
    <div><b>Final Answer (Judge)</b></div>
    <div id="finalText"></div>
  </div>

  <script>
    const runBtn = document.getElementById("runBtn");
    const clearBtn = document.getElementById("clearBtn");
    const statusEl = document.getElementById("status");
    const debateBox = document.getElementById("debateBox");
    const debateStream = document.getElementById("debateStream");
    const finalBox = document.getElementById("finalBox");
    const finalText = document.getElementById("finalText");

    function resetUI() {
      statusEl.textContent = "";
      debateStream.innerHTML = "";
      finalText.textContent = "";
      debateBox.style.display = "none";
      finalBox.style.display = "none";
    }

    clearBtn.addEventListener("click", () => {
      document.getElementById("prompt").value = "";
      resetUI();
    });

    function addTurn(agent, time, content) {
      const div = document.createElement("div");
      div.className = "turn";
      div.innerHTML = `
        <div class="head">
          <div class="agent">${agent}</div>
          <div class="time">${new Date(time).toLocaleString()}</div>
        </div>
        <div>${content.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div>
      `;
      debateStream.appendChild(div);
      div.scrollIntoView({ behavior: "smooth", block: "end" });
    }

    runBtn.addEventListener("click", async () => {
      const prompt = document.getElementById("prompt").value.trim();
      const rounds = Number(document.getElementById("rounds").value || 1);
      const showDebate = document.getElementById("showDebate").checked;

      resetUI();
      if (!prompt) return alert("Please enter a prompt.");

      runBtn.disabled = true;
      statusEl.textContent = "Starting...";

      if (showDebate) debateBox.style.display = "block";

      try {
        const resp = await fetch("/api/debate-stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt, rounds, showDebate })
        });

        if (!resp.ok) throw new Error(await resp.text());

        const reader = resp.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop() || "";

          for (const line of lines) {
            if (!line.trim()) continue;
            let msg;
            try { msg = JSON.parse(line); } catch { continue; }

            if (msg.type === "status") statusEl.textContent = msg.message || "";
            if (msg.type === "turn" && showDebate) addTurn(msg.agent, msg.time, msg.content || "");
            if (msg.type === "final") {
              finalBox.style.display = "block";
              finalText.textContent = msg.content || "";
              statusEl.textContent = "Done.";
            }
            if (msg.type === "error") statusEl.textContent = "Error: " + (msg.message || "");
          }
        }
      } catch (e) {
        statusEl.textContent = "Error: " + e.message;
      } finally {
        runBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
