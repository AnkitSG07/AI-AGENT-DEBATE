<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Debate Room</title>
  <style>
    body { font-family: system-ui, Arial; max-width: 900px; margin: 24px auto; padding: 0 12px; }
    textarea { width: 100%; min-height: 120px; padding: 12px; font-size: 14px; }
    button { padding: 10px 14px; font-size: 14px; cursor: pointer; }
    .row { display: flex; gap: 10px; align-items: center; margin: 12px 0; flex-wrap: wrap; }
    .box { border: 1px solid #ddd; border-radius: 10px; padding: 12px; margin-top: 12px; white-space: pre-wrap; }
    .muted { color: #666; font-size: 13px; }
    label { display: flex; gap: 6px; align-items: center; }
    input[type="number"] { width: 80px; padding: 6px; }
  </style>
</head>
<body>
  <h2>AI Debate Room</h2>
  <p class="muted">One prompt → ChatGPT & Gemini debate → One final answer.</p>

  <textarea id="prompt" placeholder="Type your prompt..."></textarea>

  <div class="row">
    <label>Turns:
      <input id="turns" type="number" value="4" min="2" max="10" step="1" />
    </label>
    <label>
      <input id="showDebate" type="checkbox" checked />
      Show debate transcript
    </label>
    <button id="runBtn">Run Debate</button>
  </div>

  <div id="status" class="muted"></div>

  <div class="box" id="finalBox" style="display:none;"></div>
  <div class="box" id="debateBox" style="display:none;"></div>

  <script>
    const runBtn = document.getElementById("runBtn");
    const statusEl = document.getElementById("status");
    const finalBox = document.getElementById("finalBox");
    const debateBox = document.getElementById("debateBox");

    runBtn.addEventListener("click", async () => {
      const prompt = document.getElementById("prompt").value.trim();
      const turns = Number(document.getElementById("turns").value || 4);
      const showDebate = document.getElementById("showDebate").checked;

      finalBox.style.display = "none";
      debateBox.style.display = "none";
      finalBox.textContent = "";
      debateBox.textContent = "";

      if (!prompt) return alert("Please enter a prompt.");

      statusEl.textContent = "Running debate...";
      runBtn.disabled = true;

      try {
        const resp = await fetch("/api/debate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt, turns, showDebate })
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || "Request failed");

        finalBox.style.display = "block";
        finalBox.textContent = data.finalAnswer || "(No final answer returned)";

        if (showDebate && data.debate) {
          debateBox.style.display = "block";
          debateBox.textContent = data.debate
            .map(m => `=== ${m.role.toUpperCase()} ===\n${m.content}\n`)
            .join("\n");
        }

        statusEl.textContent = "Done.";
      } catch (e) {
        statusEl.textContent = "Error: " + e.message;
      } finally {
        runBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
